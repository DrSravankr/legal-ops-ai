version: '3.9'

services:
  legal-ops:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./data/uploads:/app/backend/uploads
      - ./data/reports:/app/backend/reports
    restart: unless-stopped
